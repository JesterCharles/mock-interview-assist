name: Deploy Prod

# D-11 / D-13: prod deploys triggered ONLY by SemVer-prefixed tags.
# No branch/PR trigger (T-51-03 mitigation — pr-checks.yml already gates main).
# First run: tag v1.5.0-rc1 (Phase 51 smoke). Full v1.5.0 reserved for post-cutover.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Serialize prod deploys; T-51-15 mitigation (no racing concurrent tags).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # Required for WIF OIDC token minting (T-51-12 scoped per-job)
  contents: read

jobs:
  deploy:
    name: Build + Migrate + Deploy + Smoke (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROJECT_ID: nlm-prod
      REGION: us-central1
      SERVICE: nlm-prod
      IMAGE_REPO: us-central1-docker.pkg.dev/nlm-prod/nlm-app/nlm-app
      RUNTIME_SA: nlm-cloudrun-sa@nlm-prod.iam.gserviceaccount.com
      # D-11 step 4: smoke against *.run.app URL pre-DNS; nextlevelmock.com still points at v0.1 GCE
      # until Phase 52 cutover. URL is resolved at runtime from `gcloud run services describe`.

    steps:
      # ---- STEP 1: Checkout + WIF auth ------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.PROD_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deployer@nlm-prod.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ---- STEP 2: Fetch secrets from prod Secret Manager ---------------------------
      # F-02: NEXT_PUBLIC_* are inlined into the client bundle at build time, so
      # they MUST be fetched BEFORE `docker build` and passed as --build-arg.
      # DIRECT_URL is used later for prisma migrate deploy.
      - name: Fetch secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          # Literal project paths (Plan 51-03 verify grep expects `DIRECT_URL:nlm-prod/DIRECT_URL`).
          secrets: |-
            DIRECT_URL:nlm-prod/DIRECT_URL
            ADMIN_EMAILS:nlm-prod/ADMIN_EMAILS
            NEXT_PUBLIC_SUPABASE_URL:nlm-prod/NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:nlm-prod/NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
            NEXT_PUBLIC_SITE_URL:nlm-prod/NEXT_PUBLIC_SITE_URL

      # ---- STEP 3: Docker build + push to prod Artifact Registry --------------------
      # D-11 step 1: build + push by digest; :latest + git ref tag added for operator convenience.
      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.ref_name }}
          # F-02: pass NEXT_PUBLIC_* as build ARGs — Next.js inlines them into
          # the client bundle at build time. Missing these ships an image with
          # empty strings, breaking browser Supabase auth on first revision.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ steps.secrets.outputs.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ steps.secrets.outputs.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ steps.secrets.outputs.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Verify digest is non-empty
        run: |
          [ -n "${{ steps.build.outputs.digest }}" ] \
            || (echo "::error::docker/build-push-action did not emit a digest"; exit 1)
          echo "Image digest: ${{ steps.build.outputs.digest }}"

      # ---- STEP 4: Prisma migrate deploy (D-11 step 2 — BEFORE gcloud run deploy) ----
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (minimal for prisma)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prisma migrate deploy against prod DIRECT_URL
        env:
          # prisma.config.ts reads process.env.DIRECT_URL (not DATABASE_URL).
          DIRECT_URL: ${{ steps.secrets.outputs.DIRECT_URL }}
        run: npx prisma migrate deploy

      # ---- STEP 5: Deploy Cloud Run by digest (D-11 step 3) -------------------------
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }} \
            --service-account=${{ env.RUNTIME_SA }} \
            --quiet
          REVISION=$(gcloud run services describe ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.latestCreatedRevisionName)')
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # ---- STEP 6: Post-deploy smoke against *.run.app URL (D-11 step 4) ------------
      # Accepts 200 OR 503 per INFRA-07 Option C (Prisma cold-start transient).
      # Hits the default Cloud Run URL, NOT nextlevelmock.com (apex still on v0.1 until Phase 52).
      - name: Smoke /api/health
        run: |
          URL='${{ steps.deploy.outputs.url }}'
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -m 30 "$URL/api/health" || echo "000")
            echo "attempt $i -> HTTP $CODE (target: $URL/api/health)"
            if [ "$CODE" = "200" ] || [ "$CODE" = "503" ]; then
              echo "::notice::Smoke check passed (HTTP $CODE; 503 accepted per INFRA-07 Option C)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Smoke check failed after 6 retries"
          exit 1

      # ---- STEP 7: Job summary -------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Deploy Prod — ${{ job.status }}"
            echo ""
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Image: \`${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}\`"
            echo "- Revision: \`${{ steps.deploy.outputs.revision }}\`"
            echo "- Pre-DNS smoke URL: ${{ steps.deploy.outputs.url }}/api/health"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- STEP 8: Email on failure (D-11 step 5) -----------------------------------
      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.resend.com
          server_port: 465
          secure: true
          username: resend
          password: ${{ secrets.RESEND_API_KEY }}
          subject: "[NLM] deploy-prod.yml FAILED (${{ github.ref_name }})"
          to: ${{ steps.secrets.outputs.ADMIN_EMAILS }}
          from: alerts@nextlevelmock.com
          body: |
            Prod deploy failed. Tag: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
